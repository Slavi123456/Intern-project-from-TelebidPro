<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Responsive Grid</title>
  <link rel="stylesheet" href="/assets/css/main.css" />
</head>

<body>
  <div class="grid">
    <div class="item">
      <p>Districts count:</p>
      <p id="district_info"></p>
    </div>
    <div class="item">
      <p>Township count:</p>
      <p id="township_info"></p>
    </div>
    <div class="item">
      <p>Cityhalls count:</p>
      <p id="cityhall_info"></p>
    </div>
    <div class="item">
      <p>Village count:</p>
      <p id="village_info"></p>
    </div>

    <div class="item query">
      <form id="villageForm">
        <label for="fname">Име на селище:</label>
        <input type="text" id="bg-name" />

        <label for="lname">Име на английски:</label>
        <input type="text" id="en-name" />

        <button type="submit">Submit</button>
      </form>
    </div>

    <div class="item table">
      <div class="tableBtn">
        <button id="createRowBtn">Създай нов ред</button>
        <button id="exportCSV">Изтегли статисика - CSV</button>
        <button id="exportXLSX">Изтегли статисика - XLSX</button>
        <button id="documentation">Документация</button>
      </div>
      <table id="villagesTable">
        <thead>
          <tr>
            <th data-column="id"><div class="table-column">ID <img src="./assets/static/sort.png" alt="Image"></div></th>
            <th data-column="nameBG"><div class="table-column">Name (BG) <img src="./assets/static/sort.png" alt="Image"></div></th>
            <th data-column="nameEN"><div class="table-column">Name (EN) <img src="./assets/static/sort.png" alt="Image"></div></th>
            <th data-column="district"><div class="table-column">District <img src="./assets/static/sort.png" alt="Image"></div></th>
            <th data-column="township"><div class="table-column">Township <img src="./assets/static/sort.png" alt="Image"></div></th>
            <th data-column="cityhall"><div class="table-column">Cityhall <img src="./assets/static/sort.png" alt="Image"></div></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>

      <div id="pagination">
        <button id="prevBtn">Предишна</button>
        <span id="pageInfo">Страница 1</span>
        <button id="nextBtn">Следваща</button>
      </div>

    </div>
  </div>

  <script src="/assets/js/main.js"></script>
</body>

</html>
