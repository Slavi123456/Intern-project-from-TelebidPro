<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Корекции</title>
  <link rel="stylesheet" href="/assets/css/edit_data.css" />

</head>

<body>
  <div class="container">
    <h1>Създай ново селище</h1>
    <p id="error-message"></p>
    <form id="new-entry-form">
      <div>
        <label for="name">Име</label>
        <input type="text" id="name" name="name" required />
      </div>

      <div>
        <label for="name_en">Име (English)</label>
        <input type="text" id="name_en" name="name_en" required />
      </div>

      <div>
        <label for="township_id">Община</label>
        <select id="township_id" name="township_id" required>
          <option value="">Loading...</option>
        </select>
      </div>

      <div>
        <label for="district_id">Област</label>
        <select id="district_id" name="district_id" required>
          <option value="">Loading...</option>
        </select>
      </div>

      <button type="submit">Запиши</button>
    </form>
  </div>
  <script src="/assets/js/edit_data.js"></script>
</body>

</html>
