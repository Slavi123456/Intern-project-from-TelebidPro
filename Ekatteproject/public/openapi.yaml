openapi: 3.0.3
info:
  title: Board Game Club API
  version: 1.0.0
  description: |
    This API allows clients to view events, games, and members of a board game club.
    It supports listing events, retrieving game details, and registering new members.

servers:
  - url: http://localhost:8000
    description: Local development server

paths:
  /events:
    get:
      summary: Get all upcoming events
      description: Returns a list of all scheduled events at the club.
      responses:
        "200":
          description: A JSON array of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"

  /events/{id}:
    get:
      summary: Get a single event
      description: Returns details of a single event identified by ID.
      parameters:
        - name: id
          in: path
          required: true
          description: Numeric ID of the event to get
          schema:
            type: integer
      responses:
        "200":
          description: Event found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "404":
          description: Event not found

  /members:
    post:
      summary: Add a new member
      description: Register a new member in the club.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewMember"
      responses:
        "201":
          description: Member created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "400":
          description: Invalid request

components:
  schemas:
    Event:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier for the event
        type:
          type: string
          description: Type of the event (e.g., tournament, meetup)
        title:
          type: string
          description: Name of the event
        time:
          type: string
          format: time
          description: Start time of the event
        day:
          type: string
          description: Day of the week
      required:
        - id
        - type
        - title
        - time
        - day

    Member:
      type: object
      properties:
        username:
          type: string
          description: Member’s username
        role:
          type: string
          description: Role in the club (organizer, player)
        favoriteGame:
          type: string
          description: Favorite board game
      required:
        - username
        - role

    NewMember:
      type: object
      properties:
        username:
          type: string
        role:
          type: string
        favoriteGame:
          type: string
      required:
        - username
        - role
